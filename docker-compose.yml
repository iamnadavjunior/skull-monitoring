version: "3.8"

services:
  # ── MySQL Database ──────────────────────────────────
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_NAME:-openschool}
      MYSQL_USER: ${DB_USER:-openschool}
      MYSQL_PASSWORD: ${DB_PASS:-openschool_secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "${DB_PORT_EXPOSE:-3306}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── PHP + Apache Application ────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: ${DB_NAME:-openschool}
      DB_USER: ${DB_USER:-openschool}
      DB_PASS: ${DB_PASS:-openschool_secret}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_TO_A_RANDOM_64_CHAR_STRING}
      JWT_EXPIRY: ${JWT_EXPIRY:-86400}
      APP_URL: ${APP_URL:-http://localhost}
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - upload_data:/var/www/html/uploads
    networks:
      - app-network

volumes:
  db_data:
  upload_data:

networks:
  app-network:
    driver: bridge
